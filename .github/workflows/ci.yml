name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Lint + Format (check only)
        run: |
          ruff check src tests
          ruff format --check src tests
          black --check src tests

      - name: Type-check
        run: |
          mypy src/aetherya

      - name: Jailbreak Regression Suite
        run: |
          pytest tests/test_jailbreak_guard.py tests/test_jailbreak_guard_stress.py tests/test_security_corpus_regression.py -q

      - name: Audit Integrity Stress Suite
        run: |
          pytest tests/test_audit_verify.py tests/test_audit_integrity_stress.py tests/test_audit_tamper_campaign.py -q

      - name: Security Baseline Regression (Versioned)
        run: |
          make security_baseline

      - name: Capability Regression Suite
        run: |
          pytest tests/test_capability_gate.py tests/test_pipeline_capability_gate.py -q

      - name: Confirmation Regression Suite
        run: |
          pytest tests/test_confirmation_gate.py tests/test_pipeline_confirmation_gate.py -q

      - name: Tests + Coverage
        run: |
          pytest --cov

      - name: Audit Attestation Self-Check (Strict HMAC)
        run: |
          export AETHERYA_ATTESTATION_KEY="ci-attestation-key"
          mkdir -p audit
          python - <<'PY'
          from aetherya.audit import AuditLogger

          logger = AuditLogger("audit/ci_decisions.jsonl")
          logger.log(
              actor="ci",
              action="self-check",
              decision={"allowed": True, "risk_score": 0, "state": "allow"},
              context={"mode": "consultive", "stage": "ci"},
          )
          PY
          python -m aetherya.audit_verify --audit-path audit/ci_decisions.jsonl --require-hmac

  security_gate:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Security Gate (3 Phases)
        env:
          AETHERYA_ATTESTATION_KEY: ci-attestation-key
        run: |
          mkdir -p audit/security_gate
          python -m aetherya.security_gate \
            --phase2-events 1000 \
            --phase2-seed 1337 \
            --phase2-mutation-rounds 32 \
            --json > audit/security_gate/security_gate_result.json

      - name: Upload Security Gate Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-gate-${{ github.run_id }}
          path: |
            audit/security_gate/security_gate_result.json
            audit/security_gate/security_manifest.json
            audit/security_gate/phase1_corpus_audit.jsonl
            audit/security_gate/phase2_tamper_audit.jsonl
          if-no-files-found: warn

  chaos_tests:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Chaos Targeted Tests
        run: |
          pytest tests/test_audit_chaos_bytes.py tests/test_pipeline_fail_close.py -q

      - name: Chaos Benchmark (Latency SLO)
        env:
          AETHERYA_ATTESTATION_KEY: ci-attestation-key
        run: |
          python -m aetherya.chaos_benchmark \
            --runs 25 \
            --events 48 \
            --seed 1337 \
            --p95-max-ms 12 \
            --p99-max-ms 20 \
            --workdir audit/chaos \
            --output audit/chaos/chaos_benchmark_metrics.json \
            --json

      - name: Upload Chaos Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-${{ github.run_id }}
          path: |
            audit/chaos/chaos_benchmark_metrics.json
            audit/chaos/chaos_run_*.jsonl
          if-no-files-found: warn

  pipeline_slo:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Pipeline Latency Benchmark (SLO)
        run: |
          python -m aetherya.pipeline_benchmark \
            --runs 1 \
            --corpus-size 100 \
            --seed 1337 \
            --p95-max-ms 10 \
            --p99-max-ms 15 \
            --output audit/pipeline/pipeline_benchmark_metrics.json \
            --json

      - name: Upload Pipeline Benchmark Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-slo-${{ github.run_id }}
          path: |
            audit/pipeline/pipeline_benchmark_metrics.json
          if-no-files-found: warn

  semantic_slo:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2-${{ runner.os }}

      - name: Run slow semantic tests (real model)
        run: |
          pytest -m slow --run-slow -q

      - name: Semantic Pipeline Benchmark (SLO p95 ≤ 150ms)
        run: |
          python -m aetherya.pipeline_benchmark \
            --runs 1 \
            --corpus-size 100 \
            --seed 1337 \
            --p95-max-ms 150 \
            --p99-max-ms 200 \
            --use-semantic \
            --output audit/pipeline/semantic_benchmark_metrics.json \
            --json

      - name: Upload Semantic Benchmark Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semantic-slo-${{ github.run_id }}
          path: audit/pipeline/semantic_benchmark_metrics.json
          if-no-files-found: warn

  release_readiness:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [test, security_gate, chaos_tests, pipeline_slo, semantic_slo]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Download Security Gate Artifacts
        uses: actions/download-artifact@v4
        with:
          name: security-gate-${{ github.run_id }}
          path: audit/release_artifacts/security_gate

      - name: Verify Release Artifacts (strict)
        env:
          AETHERYA_ATTESTATION_KEY: ci-attestation-key
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python -m aetherya.verify_release_artifacts \
            --manifest-path audit/release_artifacts/security_gate/security_manifest.json \
            --phase1-audit-path audit/release_artifacts/security_gate/phase1_corpus_audit.jsonl \
            --expected-commit-sha "${GITHUB_SHA}" \
            --corpus-path tests/fixtures/security_corpus/v1/jailbreak_attacks.json \
            --json > audit/release_artifacts/release_artifact_verification.json

      - name: Release Gate Summary
        run: |
          echo "Release ${GITHUB_REF_NAME} passed: test + security_gate + chaos_tests + pipeline_slo + artifact_verification"

      - name: Upload Release Readiness Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness-${{ github.run_id }}
          path: |
            audit/release_artifacts/release_artifact_verification.json
            audit/release_artifacts/security_gate/security_manifest.json
          if-no-files-found: warn
