exclude: ^(\.venv/|build/|dist/|\.mypy_cache/|\.pytest_cache/|\.ruff_cache/|htmlcov/|\.eggs/|.*\.egg-info/)
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        exclude: ^\.venv/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: ["--config-file=pyproject.toml"]
        additional_dependencies:
          - types-PyYAML
          - typing-extensions
        files: ^src/
